name: CD

# Only runs when code is pushed/merged to main
# This is the "deploy" trigger - feature branches run CI only,
# main branch runs CI + CD (build and push to Docker Hub)
on:
  push:
    branches: ["main"]

jobs:
  push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract git SHA tag
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            jananiupeksha/todo-api:latest
            jananiupeksha/todo-api:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            jananiupeksha/todo-worker:latest
            jananiupeksha/todo-worker:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
