name: CI

# Runs on every push and pull request to any branch
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 api/app api/tests --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues but don't fail the build
          flake8 api/app api/tests --count --exit-zero --max-line-length=100 --statistics

      - name: Run tests
        run: python -m pytest api/tests/ -v

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test  # only runs if test job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false  # just build, don't push (that's Phase 9)
          tags: todo-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: false
          tags: todo-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
